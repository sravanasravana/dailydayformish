    <style>
        /* --- MAIN BACKGROUND --- */
        body {
            background-color: #F2C14D;

            padding: 20px 0;

        }

        /* --- THE SCROLLABLE RECTANGLE --- */
        .container {
            background-color: #FCECA6;
            width: 310px; 
            min-height: 1489px; 
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center; 
            padding: 30px 0; 
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .flower-pattern {

            height: 45px;

        }

            height: 258px;

        }

        /* --- TEXT STYLING --- */
        h1 {
            font-size: 20px; 
            font-weight: normal;
            text-align: center;
            margin: 0 0 25px 0;
            letter-spacing: 1px;
        }

        .section-title {
            font-size: 18px;
            text-align: center;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        /* --- THE CONTENT BOXES --- */
        .content-box {
            border-radius: 15px; 
            box-sizing: border-box;
            padding: 15px;
            margin-bottom: 25px;
            overflow-y: auto; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            font-size: 14px;

        /* 1. Mini Letter Box */
        .letter-box {
            width: 262px;
            height: 167px;
            background-color: #FFFAE3;
            border: 4px solid #F2C14D; /* Added the golden stroke! */

        /* 2. Agenda Box */
        .agenda-box {

            height: 348px;
            background-color: #FFFAE3;
            border: 4px solid #F2C14D; /* Added the golden stroke! */
        }

        /* 3. Photo Box */

            height: 262px; 
            background-color: #FFFAE3;
            border: 4px solid #F2C14D; 
            padding: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        .photo-box img.daily-photo {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        ul {
            margin-top: 0;
            padding-left: 20px;
        }
        
        a {
            color: #d18a1d;
            text-decoration: none;
            font-weight: bold;
        }
