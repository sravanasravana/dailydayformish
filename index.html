<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello There, My Mishel!</title>
    
    <!-- Importing the 'Handlee' font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Handlee&display=swap" rel="stylesheet">

    <style>
        /* --- MAIN BACKGROUND --- */
        body {
            background-color: #F2C14D; 
            display: flex;
            justify-content: center;
            font-family: 'Handlee', cursive; 
            margin: 0;
            padding: 20px 0; 
            color: #4a3b1c; 
        }

        /* --- THE SCROLLABLE RECTANGLE --- */
        .container {
            background-color: #FCECA6;
            width: 310px; 
            min-height: 1489px; 
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center; 
            padding: 30px 0; 
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* --- IMAGES & ILLUSTRATIONS --- */
        .flower-pattern {
            width: 262px;
            height: 45px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .malayalam-badge {
            width: 107px;
            height: 77px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .top-illustration {
            width: 258px;
            height: 258px;
            object-fit: cover;
            border-radius: 15px; 
            margin-bottom: 20px;
        }

        /* --- TEXT STYLING --- */
        h1 {
            font-size: 20px; 
            font-weight: normal;
            text-align: center;
            margin: 0 0 25px 0;
            letter-spacing: 1px;
        }

        .section-title {
            font-size: 18px;
            text-align: center;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        /* --- THE CONTENT BOXES --- */
        .content-box {
            border-radius: 15px; 
            box-sizing: border-box;
            padding: 15px;
            margin-bottom: 25px;
            overflow-y: auto; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            font-size: 14px;
        }

        /* 1. Mini Letter Box */
        .letter-box {
            width: 262px;
            height: 167px;
            background-color: #FFFAE3;
            border: 4px solid #F2C14D; /* Added the golden stroke! */
        }

        /* 2. Agenda Box */
        .agenda-box {
            width: 262px;
            height: 348px;
            background-color: #FFFAE3;
            border: 4px solid #F2C14D; /* Added the golden stroke! */
        }

        /* 3. Photo Box */
        .photo-box {
            width: 262px;
            height: 262px; 
            background-color: #FFFAE3;
            border: 4px solid #F2C14D; 
            padding: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        .photo-box img.daily-photo {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        ul {
            margin-top: 0;
            padding-left: 20px;
        }
        
        a {
            color: #d18a1d;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- TOP FLOWER PATTERN -->
        <img src="curly-flower.png" alt="Flower Pattern" class="flower-pattern" onerror="this.style.display='none'">

        <!-- BADGE -->
        <img src="badge.png" alt="Malayalam Text" class="malayalam-badge" onerror="this.style.display='none'">
        
        <!-- ILLUSTRATION -->
        <img src="illustration.png" alt="Couple Illustration" class="top-illustration" onerror="this.style.display='none'">
        
        <!-- MAIN TITLE -->
        <h1>HELLO THERE, MY MISHEL!</h1>

        <!-- MINI LETTER -->
        <div class="section-title">MINI LETTER</div>
        <div class="content-box letter-box" id="letter-content"></div>

        <!-- AGENDA -->
        <div class="section-title">TODAYS AGENDA</div>
        <div class="content-box agenda-box" id="agenda-content"></div>

        <!-- PHOTO OF THE DAY -->
        <div class="section-title">PHOTO OF THE DAY</div>
        <div class="content-box photo-box" id="photo-content"></div>

        <!-- BOTTOM FLOWER PATTERN -->
        <img src="curly-flower.png" alt="Flower Pattern" class="flower-pattern" onerror="this.style.display='none'" style="margin-top: 10px;">

    </div>

    <script>
        /* =========================================================
           👇 PRE-LOAD YOUR DAYS HERE 👇
           ========================================================= */
        
        const scheduledUpdates = {
            
            "2026-05-05": {
                letter: "Happy Tuesday, Mishel! I hope today is amazing for you.",
                agenda: "• 10 AM - Morning Class<br>• 1 PM - Lunch<br>• <a href='https://youtube.com/watch?v=example' target='_blank'>Origami Crane Tutorial</a><br>• 8 PM - Call me!",
                photoUrl: "day1.jpg" 
            },
            
            "2026-05-06": {
                letter: "Happy Wednesday! We are halfway through the week. Keep going strong!",
                agenda: "• 9 AM - Lab work<br>• <a href='https://example.com/recipe' target='_blank'>Pasta Recipe for Dinner</a><br>• Drink water!",
                photoUrl: "day2.jpg" 
            },

            "2026-05-07": {
                letter: "Good morning! Just a little note to remind you how much I care.",
                agenda: "• Relaxing today!<br>• Let's watch a movie tonight.",
                photoUrl: "day3.jpg" 
            }
        };

        /* =========================================================
           👆 STOP UPDATING HERE 👆
           ========================================================= */

        const today = new Date();
        const offset = today.getTimezoneOffset() * 60000;
        const localDate = new Date(today.getTime() - offset).toISOString().split('T')[0];

        const todaysUpdate = scheduledUpdates[localDate];

        if (todaysUpdate) {
            document.getElementById('letter-content').innerHTML = todaysUpdate.letter;
            document.getElementById('agenda-content').innerHTML = todaysUpdate.agenda;
            
            if(todaysUpdate.photoUrl) {
                document.getElementById('photo-content').innerHTML = `<img src="${todaysUpdate.photoUrl}" class="daily-photo" alt="Photo of the Day">`;
            }
        } else {
            document.getElementById('letter-content').innerHTML = "I'm working on today's surprise! Check back a little later ❤️";
            document.getElementById('agenda-content').innerHTML = "• Thinking of you<br>• Preparing something special";
            document.getElementById('photo-content').innerHTML = ""; 
        }
    </script>

</body>
</html>
