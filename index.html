<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello There, My Mishel!</title>
    <style>
        /* --- DESIGN & COLORS --- */
        body {
            background-color: #e5b84e; /* Darker yellow background */
            display: flex;
            justify-content: center;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            padding: 20px 10px;
            margin: 0;
            color: #725a2b; 
        }

        .container {
            background-color: #fceea4; /* Light yellow main card */
            width: 100%;
            max-width: 450px;
            border-radius: 25px;
            padding: 40px 25px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* --- TOP STATIC IMAGES STYLING --- */
        .malayalam-badge {
            display: block;
            margin: 0 auto 15px auto;
            max-width: 150px; /* Adjust this to make the top badge bigger or smaller */
        }

        .curly-flower {
            display: block;
            margin: 0 auto 10px auto;
            max-width: 90%; /* Keeps the curly flower inside the borders */
        }

        .top-illustration {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 10px;
            display: block;
        }

        /* --- TEXT AND BOX STYLING --- */
        h1 {
            text-align: center;
            font-size: 1.3rem;
            margin-top: 20px;
            margin-bottom: 35px;
            letter-spacing: 1.5px;
            font-weight: normal;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .content-box {
            background-color: #fdf5c9;
            border: 4px solid #f6d269;
            border-radius: 15px;
            padding: 20px;
            min-height: 120px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1rem;
            line-height: 1.6;
            color: #4a3b1c;
        }

        .agenda-box {
            min-height: 250px;
        }

        /* Styling for your daily photo */
        .content-box img.daily-photo {
            width: 100%;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }

        ul {
            margin-top: 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- ==========================================
             YOUR 3 PERMANENT TOP IMAGES 
             (Upload these once to GitHub!)
             ========================================== -->
             
        <!-- 1. The Malayalam Text Badge -->
        <img src="badge.png" alt="Malayalam Text" class="malayalam-badge" onerror="this.style.display='none'">
        
        <!-- 2. The Curly Flower Divider -->
        <img src="curly-flower.png" alt="Decorative Flower" class="curly-flower" onerror="this.style.display='none'">

        <!-- 3. The Main Illustration -->
        <img src="illustration.png" alt="Couple Illustration" class="top-illustration" onerror="this.style.display='none'">
        
        <!-- Optional: Another curly flower for the bottom if you cut it into 3 parts! -->
        <img src="curly-flower.png" alt="Decorative Flower" class="curly-flower" onerror="this.style.display='none'">

        <!-- ========================================== -->

        <h1>HELLO THERE, MY MISHEL!</h1>

        <!-- MINI LETTER SECTION -->
        <div class="section">
            <div class="section-title">MINI LETTER</div>
            <div class="content-box" id="letter-content"></div>
        </div>

        <!-- TODAYS AGENDA SECTION -->
        <div class="section">
            <div class="section-title">TODAYS AGENDA</div>
            <div class="content-box agenda-box" id="agenda-content"></div>
        </div>

        <!-- PHOTO OF THE DAY SECTION -->
        <div class="section">
            <div class="section-title">PHOTO OF THE DAY</div>
            <div class="content-box" id="photo-content"></div>
        </div>
    </div>

   <script>
        /* =========================================================
           👇 PRE-LOAD YOUR 3 DAYS HERE 👇
           ========================================================= */
        
        const scheduledUpdates = {
            
            // --- DAY 1 (TODAY) ---
            "2026-05-05": {
                letter: "Happy Tuesday, Mishel! I hope today is amazing for you.",
                agenda: "• 10 AM - Morning Class<br>• 1 PM - Lunch<br>• 8 PM - Call me!",
                photoUrl: "day1.png" 
            },
            
            // --- DAY 2 (TOMORROW) ---
            "2026-05-06": {
                letter: "Happy Wednesday! We are halfway through the week. Keep going strong!",
                agenda: "• 9 AM - Lab work<br>• 3 PM - Study session<br>• Drink water!",
                photoUrl: "day2.png" 
            },

            // --- DAY 3 (THURSDAY) ---
            "2026-05-07": {
                letter: "Good morning! Just a little note to remind you how much I care.",
                agenda: "• Relaxing today!<br>• Let's watch a movie tonight.",
                photoUrl: "day3.png" 
            }
        };

        /* =========================================================
           👆 STOP UPDATING HERE 👆
           ========================================================= */

        // Figure out what day it is locally
        const today = new Date();
        const offset = today.getTimezoneOffset() * 60000;
        const localDate = new Date(today.getTime() - offset).toISOString().split('T')[0];

        // Find the matching update
        const todaysUpdate = scheduledUpdates[localDate];

        // Put it on the screen
        if (todaysUpdate) {
            document.getElementById('letter-content').innerHTML = todaysUpdate.letter;
            document.getElementById('agenda-content').innerHTML = todaysUpdate.agenda;
            
            if(todaysUpdate.photoUrl) {
                document.getElementById('photo-content').innerHTML = `<img src="${todaysUpdate.photoUrl}" class="daily-photo" alt="Photo of the Day">`;
            }
        } else {
            // The backup message if you haven't loaded anything for the current day
            document.getElementById('letter-content').innerHTML = "I'm working on today's surprise! Check back a little later ❤️";
            document.getElementById('agenda-content').innerHTML = "• Thinking of you<br>• Preparing something special";
            document.getElementById('photo-content').innerHTML = ""; 
        }
    </script>

</body>
</html>
